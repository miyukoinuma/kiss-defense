<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="💋NUMARIN - 至高のリズム・ディフェンス。迫り来る唇を、NMRの誇りにかけて止めろ。">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>💋NUMARIN | 至高のリズム・ディフェンス</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Title Screen -->
    <div id="title-screen" class="screen active">
        <div class="title-content">
            <div class="brand-logo-container">
                <img src="assets/logo.jpg" alt="NMR Logo" class="brand-logo" id="title-logo-img">
            </div>
            <div class="title-logo">
                <h1 class="title-main">NUMARIN</h1>
                <p class="title-sub">— Don't Let Them Through —</p>
            </div>
            <div class="input-group">
                <input type="text" id="player-name" placeholder="YOUR INITIALS" maxlength="10" spellcheck="false">
                <div class="input-line"></div>
            </div>
            <button class="gold-btn start-btn" id="btn-start">
                <span>ENTER THE STAGE</span>
            </button>
            <p class="title-credit">♪ ベートーベン：運命 — Luxury CM Arrange</p>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <canvas id="game-canvas"></canvas>
        <div class="game-hud" id="game-hud">
            <div class="hud-top">
                <div class="hud-left">
                    <img src="assets/logo.jpg" alt="NMR Score Logo" class="hud-logo">
                </div>
                <div class="hud-center">
                    <div class="hud-item">
                        <span class="hud-label">SCORE</span>
                        <span class="hud-value" id="hud-score">0</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">COMBO</span>
                        <span class="hud-value" id="hud-combo">0</span>
                    </div>
                </div>
                <div class="hud-right">
                    <div class="hud-item">
                        <span class="hud-label">BPM</span>
                        <span class="hud-value" id="hud-bpm">108</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="screen">
        <div class="gameover-kisses" id="gameover-kisses"></div>
        <div class="gameover-content">
            <div class="gameover-logo-container">
                <img src="assets/logo.jpg" alt="NMR Over Logo" class="gameover-logo">
            </div>
            <h2 class="gameover-title">MISSION OVER</h2>
            <div class="gameover-score-block">
                <span class="gameover-label">FINAL SCORE</span>
                <span class="gameover-value" id="gameover-score">0</span>
            </div>
            <div class="gameover-stats">
                <div class="gameover-stat">
                    <span class="gameover-stat-label">BLOCKED</span>
                    <span class="gameover-stat-value" id="gameover-blocked">0</span>
                </div>
                <div class="gameover-stat">
                    <span class="gameover-stat-label">MAX COMBO</span>
                    <span class="gameover-stat-value" id="gameover-maxcombo">0</span>
                </div>
                <div class="gameover-stat">
                    <span class="gameover-stat-label">TIME</span>
                    <span class="gameover-stat-value" id="gameover-time">0:00</span>
                </div>
            </div>

            <div class="leaderboard-container">
                <h3 class="leaderboard-title">NMR ELITE RANKING</h3>
                <div id="leaderboard-list" class="leaderboard-list">
                    <!-- Leaderboard items will be injected here -->
                </div>
            </div>

            <button class="gold-btn retry-btn" id="btn-retry">
                <span>RETRY MISSION</span>
            </button>
        </div>
    </div>

    <script src="js/audio.js?v=9"></script>
    <script src="js/renderer.js?v=9"></script>
    <script src="js/game.js?v=9"></script>
</body>
</html>
